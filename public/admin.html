<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - CFL-Eye</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="login-page">

  <div class="login-container">
    <h1>Admin Panel</h1>

    <form id="loginForm" autocomplete="on">
      <input type="text" id="username" placeholder="Admin username" required />
      <input type="password" id="password" placeholder="Password" required />

      <button type="submit" id="loginBtn">Login</button>

      <p><a href="index.html">Back to User Login</a></p>
      <p id="errorMsg" style="color:red; margin-top:10px;"></p>
    </form>
  </div>

  <script>
    const apiBase = window.location.origin; // ✅ يشتغل حتى لو تغير البورت

    const form = document.getElementById("loginForm");
    const errorMsg = document.getElementById("errorMsg");
    const loginBtn = document.getElementById("loginBtn");

    function setError(msg) {
      errorMsg.textContent = msg || "";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      setError("");

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!username || !password) {
        setError("Please enter username and password.");
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = "Logging in...";

      try {
        const response = await fetch(`${apiBase}/api/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });

        // لو السيرفر رجّع خطأ
        if (!response.ok) {
          setError("Server error. Please try again.");
          return;
        }

        const data = await response.json().catch(() => null);

        if (!data) {
          setError("Invalid server response.");
          return;
        }

        // ✅ تحقق من الدخول + صلاحية admin
        if (data.success && data.role === "admin") {
          window.location.href = "cfl-eye-dashboard.html";
        } else {
          setError("Invalid admin credentials.");
        }

      } catch (err) {
        setError("Server connection error. Make sure the server is running.");
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "Login";
      }
    });
  </script>

</body>
</html>
