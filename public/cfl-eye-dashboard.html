<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - CFL-Eye</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div style="display:flex; justify-content:space-between; align-items:center; padding:20px 30px;">
    <div>
      <h2 style="margin:0;">🛡️ CFL-Eye Admin Dashboard</h2>
      <div id="systemStatus" style="font-weight:bold;">System: OK</div>
    </div>

    <div>
      <button id="pauseBtn">⏸ Pause</button>
      <button id="alertBtn">🚨 Test Alert</button>
      <button id="exportBtn">📄 Export Logs</button>
      <button id="reportBtn">📘 Reports</button>
      <button id="logoutBtn">🚪 Logout</button>
    </div>
  </div>

  <div style="padding:0 30px 20px; display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap:16px;">
    <div class="sensor" id="humidity">
      <div style="color:#90e0ef; font-size:18px;">Humidity</div>
      <div><span id="humVal">--</span></div>
      <div class="status-normal">Normal</div>
    </div>

    <div class="sensor" id="temp">
      <div style="color:#90e0ef; font-size:18px;">Temperature</div>
      <div><span id="tempVal">--</span></div>
      <div class="status-normal">Normal</div>
    </div>

    <div class="sensor" id="gas">
      <div style="color:#90e0ef; font-size:18px;">Gas Level</div>
      <div><span id="gasVal">--</span></div>
      <div class="status-normal">Normal</div>
    </div>

    <div class="sensor" id="fire">
      <div style="color:#90e0ef; font-size:18px;">Fire Sensor</div>
      <div><span id="fireVal">--</span></div>
      <div class="status-normal">Normal</div>
    </div>

    <div class="sensor" id="door">
      <div style="color:#90e0ef; font-size:18px;">Lab Door</div>
      <div><span id="doorVal">--</span></div>
      <div class="status-normal">Normal</div>
    </div>

    <div class="sensor" id="locker">
      <div style="color:#90e0ef; font-size:18px;">Evidence Locker</div>
      <div><span id="lockerVal">--</span></div>
      <div class="status-normal">Normal</div>
    </div>

    <!-- ✅ IR Card -->
    <div class="sensor" id="ir">
      <div style="color:#90e0ef; font-size:18px;">IR</div>
      <div><span id="irVal">--</span></div>
      <div class="status-normal">Normal</div>
    </div>
  </div>

  <div style="padding:0 30px 40px;">
    <h3 style="margin-top:0;">📜 Logs</h3>
    <div id="logContainer" class="log-box"></div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      let paused = false;

      const logContainer = document.getElementById("logContainer");
      const systemStatus = document.getElementById("systemStatus");

      function addLog(message, type = "info") {
        if (!logContainer) return;
        const entry = document.createElement("div");
        entry.classList.add("log-entry", `log-${type}`);
        entry.innerHTML = `${message} <span>${new Date().toLocaleTimeString()}</span>`;
        logContainer.prepend(entry);
      }

      function setSystemStatus(level) {
        if (!systemStatus) return;
        if (level === "OK") {
          systemStatus.textContent = "System: OK";
          systemStatus.style.color = "#06d6a0";
        } else if (level === "WARNING") {
          systemStatus.textContent = "System: WARNING";
          systemStatus.style.color = "#ffd166";
        } else {
          systemStatus.textContent = "System: ALERT";
          systemStatus.style.color = "#ef476f";
        }
      }

      function normalizeName(name) {
        const n = (name || "").toLowerCase().trim();
        if (n === "gas") return "Gas Level";
        if (n === "temperature") return "Temperature";
        if (n === "humidity") return "Humidity";
        if (n === "fire" || n === "flame") return "Fire Sensor";
        if (n === "door") return "Lab Door";
        if (n === "locker") return "Evidence Locker";
        if (n === "ir" || n === "motion") return "IR";
        return name || "Unknown";
      }

      function formatValue(name, value) {
        const v = String(value ?? "");

        if (name === "Fire Sensor") return (v === "0") ? "FIRE DETECTED 🔥" : "Safe ✅";
        if (name === "IR") return (v === "1") ? "INTRUSION 🚨" : "Area Clear ✅";

        if (name === "Lab Door") {
          return (v === "1" || v.toLowerCase() === "open") ? "Open" : "Closed";
        }

        if (name === "Evidence Locker") {
          return (v === "1" || v.toLowerCase() === "open") ? "Open" : "Stored";
        }

        if (name === "Temperature") return `${v} °C`;
        if (name === "Humidity") return `${v} %`;
        if (name === "Gas Level") return `${v} ppm`;

        return v;
      }

      function updateCard(cardId, valId, newValue, statusText) {
        const valEl = document.getElementById(valId);
        const cardEl = document.getElementById(cardId);
        if (!valEl || !cardEl) return;

        valEl.textContent = newValue;

        const statusEl = cardEl.querySelector("div:last-child");
        if (!statusEl) return;

        statusEl.textContent = statusText;
        statusEl.className =
          statusText === "Normal" ? "status-normal" :
          statusText === "Warning" ? "status-warning" :
          "status-alert";
      }

      function updateSensors() {
        if (paused) return;

        fetch(`${window.location.origin}/api/sensors`)
          .then(res => res.json())
          .then(data => {
            const sensors = data || [];

            // ✅ System level from DB statuses
            const hasAlert = sensors.some(s => String(s.status) === "Alert");
            const hasWarning = sensors.some(s => String(s.status) === "Warning");

            if (hasAlert) setSystemStatus("ALERT");
            else if (hasWarning) setSystemStatus("WARNING");
            else setSystemStatus("OK");

            sensors.forEach(sensor => {
              const name = normalizeName(sensor.name);
              const rawValue = sensor.value;
              const status = sensor.status || "Normal";

              if (name === "Humidity") updateCard("humidity", "humVal", formatValue(name, rawValue), status);
              if (name === "Temperature") updateCard("temp", "tempVal", formatValue(name, rawValue), status);
              if (name === "Gas Level") updateCard("gas", "gasVal", formatValue(name, rawValue), status);

              if (name === "Fire Sensor") updateCard("fire", "fireVal", formatValue(name, rawValue), status);
              if (name === "Lab Door") updateCard("door", "doorVal", formatValue(name, rawValue), status);
              if (name === "Evidence Locker") updateCard("locker", "lockerVal", formatValue(name, rawValue), status);
              if (name === "IR") updateCard("ir", "irVal", formatValue(name, rawValue), status);
            });
          })
          .catch(err => {
            console.error(err);
            addLog("❌ Failed to fetch sensor data from server", "alert");
            setSystemStatus("ALERT");
          });
      }

      document.getElementById("pauseBtn").onclick = () => {
        paused = !paused;
        addLog(paused ? "⏸ Updates paused" : "▶ Updates resumed");
      };

      document.getElementById("alertBtn").onclick = () => {
        addLog("🚨 Manual test alert triggered!", "alert");
        setSystemStatus("ALERT");
      };

      document.getElementById("exportBtn").onclick = () => {
        const data = Array.from(document.querySelectorAll(".log-entry")).map(e => e.textContent);
        const blob = new Blob([data.join("\n")], { type: "text/plain" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "CFL-Eye_Logs.txt";
        a.click();
      };

      document.getElementById("reportBtn").onclick = () => (window.location.href = "reports.html");
      document.getElementById("logoutBtn").onclick = () => (window.location.href = "index.html");

      updateSensors();
      setInterval(updateSensors, 5000);
    });
  </script>

</body>
</html>
